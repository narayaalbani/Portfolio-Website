<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="output.css" rel="stylesheet" />

    <!-- Favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="img/favicon_io/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="img/favicon_io/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="img/favicon_io/favicon-16x16.png"
    />
    <link rel="manifest" href="img/favicon_io/site.webmanifest" />

    <!-- Pixelify Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />

    <title>Naraya Albani</title>
  </head>
  <body>
    <!-- Hero Section Start -->
    <section
      id="hero"
      class="h-[112vh] bg-repeat-x bg-bottom mt-7"
      style="background-image: url(img/gradasi\ tok.png)"
    >
      <div class="container mx-auto">
        <!-- Navbar Start -->
        <div class="flex justify-between mx-12 max-lg:justify-center">
          <h1 class="text-2xl">Naraya Albani</h1>
          <nav class="flex text-lg gap-10 items-center max-lg:hidden">
            <a href="#skill">Skill</a>
            <a href="">Portfolio</a>
            <a href="">Certificate</a>
            <a href="">Contact</a>
          </nav>
        </div>
        <!-- Navbar End -->

        <!-- Hero Text Start -->
        <div
          class="flex flex-col justify-center items-center gap-4 text-center"
        >
          <div class="text-4xl">
            <h1>Hey!👋👋</h1>
            <h1>
              I'm Naraya Albani, a
              <span class="text-yellow underline">Programmer</span>
            </h1>
          </div>
          <p class="text-xl">
            I develop and design experience that make user’s life easier
          </p>
          <div class="flex gap-10 justify-center">
            <a href="https://www.x.com/narayaalbani" target="_blank"
              ><img
                src="img/logo x.svg"
                alt="Naraya Albani's X Account"
                class="size-10"
            /></a>
            <a href="https://www.github.com/narayaalbani" target="_blank"
              ><img
                src="img/logo github.svg"
                alt="Naraya Albani's GitHub Account"
                class="size-10"
            /></a>
            <a href="https://www.linkedin.com/in/narayaalbani/" target="_blank"
              ><img
                src="img/logo linkedin.svg"
                alt="Naraya Albani's LinkedIn Account"
                class="size-10"
            /></a>
            <a href="https://www.instagram.com/narayaalbani" target="_blank">
              <img
                src="img/logo ig.svg"
                alt="Naraya Albani's Instagram Account"
                class="size-10"
              />
            </a>
          </div>
          <img src="img/panah bawah.svg" class="size-10" />
        </div>
        <!-- Hero Text End -->
      </div>
    </section>
    <!-- Hero Section End -->

    <!-- Skill Section Start -->
    <section id="skill" class="bg-dark h-screen">
      <h1 class="text-3xl text-light text-center pt-10">Skill</h1>
      <div class="flex flex-row mt-8 justify-center">
        <!-- Web Programming Start-->
        <div class="flex flex-col items-center">
          <h5 class="text-xl bg-light px-6 py-2 w-fit border-dark">
            Web Programming
          </h5>
          <div class="flex bg-light px-12 py-8">
            <img src="img/web/HTML.png" alt="HTML5" class="size-full" />
            <img src="img/web/CSS.png" alt="CSS3" class="size-full" />
            <img src="img/web/JS.png" alt="JavaScript" class="size-full" />
            <img src="img/web/Tailwind.png" alt="Tailwind" class="size-full" />
          </div>
        </div>
        <!-- Web Programming End -->

        <!-- Language Start -->
        <div class="flex flex-col items-center">
          <h5 class="text-xl bg-light px-6 py-2 w-fit border-dark">Language</h5>
          <div class="flex bg-light px-12 py-8">
            <img src="img/lang/Java.png" alt="Java" class="size-full" />
            <img src="img/lang/Kotlin.png" alt="Kotlin" class="size-full" />
          </div>
        </div>
        <!-- Language End -->

        <!-- Database Start -->
        <div class="flex flex-col items-center">
          <h5 class="text-xl bg-light px-6 py-2 w-fit border-dark">Database</h5>
          <div class="flex bg-light px-12 py-8">
            <img src="img/database/MySQL.png" alt="MySQL" class="size-full" />
          </div>
        </div>
        <!-- Database End -->

        <!-- Design Start -->
        <div class="flex flex-col items-center">
          <h5 class="text-xl bg-light px-6 py-2 w-fit border-dark">Design</h5>
          <div class="flex bg-light px-12 py-8">
            <img src="img/design/Figma.png" alt="Figma" class="size-full" />
            <img
              src="img/design/Aseprite.png"
              alt="Aseprite"
              class="size-full"
            />
          </div>
        </div>
        <!-- Design End -->
      </div>
    </section>
    <!-- Skill Section End -->
  </body>
</html>
